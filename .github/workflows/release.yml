# Adapted from drawsteel
name: Release Creation

env:
  NODE_VERSION: 20

on:
  push:
    tags:
      - "release-*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Packs
        run: npm run pullJSONtoLDB --if-present

      - name: Create ZIP
        run: |
          mkdir release

          cp system.json release/

          cp template.json release/ 2>/dev/null || true

          cp -r lang release/ 2>/dev/null || true
          cp -r templates release/ 2>/dev/null || true
          cp -r packs release/ 2>/dev/null || true
          cp -r module release/ 2>/dev/null || true
          cp -r scripts release/ 2>/dev/null || true
          cp -r styles release/ 2>/dev/null || true
          cp -r css release/ 2>/dev/null || true
          cp -r assets release/ 2>/dev/null || true
          cp -r ui release/ 2>/dev/null || true
          cp -r lib release/ 2>/dev/null || true

          cd release
          zip -r ../redsteel.zip .

      - name: Debug
        run: ls -R

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: redsteel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
